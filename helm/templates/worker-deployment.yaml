apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "policy-simulator.fullname" . }}-worker
  labels:
    {{- include "policy-simulator.labels" . | nindent 4 }}
    {{- include "policy-simulator.worker.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "policy-simulator.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "policy-simulator.worker.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.global.imageRegistry }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["celery", "-A", "app.worker:celery_app", "worker", "--loglevel=info", "-P", "solo"]
          envFrom:
            - configMapRef:
                name: {{ include "policy-simulator.fullname" . }}-config
            - secretRef:
                name: {{ include "policy-simulator.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
