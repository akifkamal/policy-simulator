{{- if (index .Values "kube-prometheus-stack" "enabled") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "policy-simulator.fullname" . }}-grafana-dashboard
  labels:
    {{- include "policy-simulator.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  policy-simulator.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "API Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"{{ include "policy-simulator.fullname" . }}-backend\"}[5m]))",
              "legendFormat": "Total Requests/s"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "API Response Latency (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service=\"{{ include "policy-simulator.fullname" . }}-backend\"}[5m])) by (le))",
              "legendFormat": "p95 Latency"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "title": "HTTP Error Rate (4xx + 5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"{{ include "policy-simulator.fullname" . }}-backend\", status=~\"4..|5..\"}[5m]))",
              "legendFormat": "Errors/s"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "fixed", "fixedColor": "red" } }
          }
        },
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"{{ .Release.Namespace }}\", pod=~\".*policy-simulator.*\"}[5m])) by (pod)",
              "legendFormat": "{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent" }
          }
        },
        {
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"{{ .Release.Namespace }}\", pod=~\".*policy-simulator.*\"}) by (pod)",
              "legendFormat": "{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        },
        {
          "title": "Celery Task Status",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"{{ include "policy-simulator.fullname" . }}-backend\", handler=\"/api/runs\", method=\"POST\"}[5m]))",
              "legendFormat": "Simulations Started/s"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["policy-simulator"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Policy Simulator",
      "uid": "policy-simulator-overview"
    }
{{- end }}
