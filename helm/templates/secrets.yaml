apiVersion: v1
kind: Secret
metadata:
  name: {{ include "policy-simulator.fullname" . }}-secrets
  labels:
    {{- include "policy-simulator.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  SEED_EMAIL: {{ .Values.secrets.seedEmail | quote }}
  SEED_PASSWORD: {{ .Values.secrets.seedPassword | quote }}
  DATABASE_URL: {{ include "policy-simulator.databaseUrl" . | quote }}
  CELERY_BROKER_URL: {{ include "policy-simulator.celeryBrokerUrl" . | quote }}
  CELERY_RESULT_BACKEND: {{ include "policy-simulator.celeryBrokerUrl" . | quote }}
